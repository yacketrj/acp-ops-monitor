repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: ggshield
        name: ggshield
        entry: ggshield secret scan pre-commit
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: trivy
        name: trivy
        entry: trivy fs --scanners secret --severity HIGH,CRITICAL .
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: semgrep
        name: semgrep
        entry: semgrep --error --config p/default --quiet
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: bats
        name: bats (shell test suite)
        entry: bats tests/
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

      - id: actionlint
        name: actionlint (workflow lint)
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false

      - id: markdownlint
        name: markdownlint-cli2
        entry: npx --yes markdownlint-cli2@0.23.1
        language: system
        types: [markdown]
        pass_filenames: false
        args: ["**/*.md"]
