name: CI Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Validate scripts exist and are executable
        run: |
          for script in *.sh; do
            [ -f "$script" ] || continue
            echo "Checking $script..."
            bash -n "$script"
          done
      - run: echo "CI Gate passed"
